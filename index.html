<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TTS Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg:       #121212;
      --surface:  #181818;
      --surface2: #282828;
      --surface3: #333333;
      --accent:   #1DB954;
      --accent-h: #1ed760;
      --text:     #ffffff;
      --muted:    #b3b3b3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .card-scroll { padding: 36px 36px 0; }
    .card-player { padding: 0 36px 36px; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .engine-toggle {
      display: flex; background: var(--surface2);
      border-radius: 20px; padding: 3px; gap: 2px;
    }
    .engine-btn {
      border: none; border-radius: 17px; cursor: pointer;
      font-size: 12px; font-weight: 600; padding: 5px 12px;
      transition: background .15s, color .15s;
      color: var(--muted); background: transparent;
    }
    .engine-btn.active { background: var(--accent); color: #000; }

    .lang-pill {
      background: var(--surface2); border: none; border-radius: 20px;
      color: var(--text); cursor: pointer;
      font-size: 13px; font-weight: 600; padding: 8px 14px;
      outline: none; transition: background .15s;
    }
    .lang-pill:hover { background: var(--surface3); }

    /* ── Text section ── */
    .text-section {
      background: var(--surface2);
      border-radius: 10px;
      border: 1.5px solid transparent;
      transition: border-color .2s;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .text-section:focus-within { border-color: var(--accent); }

    #text-input {
      width: 100%; background: transparent;
      border: none; color: var(--text);
      font-size: 16px; line-height: 1.75; outline: none;
      padding: 20px; resize: none;
      min-height: 200px; max-height: 340px; overflow-y: auto;
    }
    #text-input::placeholder { color: var(--muted); }

    /* ── Karaoke display ── */
    #text-display {
      display: none;
      font-size: 20px;
      line-height: 1.85;
      padding: 20px;
      min-height: 200px;
      max-height: 340px;
      overflow-y: auto;
    }

    /* Word states */
    .word {
      display: inline-block;
      color: #4a4a4a;
      transition: color .08s ease, text-shadow .08s ease, transform .06s ease;
      cursor: default;
    }
    .word.done {
      color: #777;
    }
    .word.active {
      color: var(--accent);
      font-weight: 700;
      text-shadow: 0 0 18px rgba(29, 185, 84, .45);
      transform: scale(1.04);
    }

    /* ── Progress bar ── */
    .progress-track {
      background: var(--surface3);
      border-radius: 4px; height: 4px;
      margin-bottom: 28px; overflow: hidden;
    }
    #progress-fill {
      background: var(--accent); border-radius: 4px; height: 100%;
      width: 0%; transition: width .4s ease;
    }

    /* ── Controls ── */
    .controls {
      display: flex; align-items: flex-end;
      justify-content: space-between; gap: 20px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    .control-label {
      color: var(--muted); font-size: 11px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
    }
    .ctrl-select {
      background: var(--surface2); border: none;
      border-radius: 20px; color: var(--text);
      cursor: pointer; font-size: 13px; font-weight: 600;
      outline: none; padding: 8px 14px;
      transition: background .15s; max-width: 260px;
    }
    .ctrl-select:hover { background: var(--surface3); }

    .speed-row { display: flex; align-items: center; gap: 10px; }
    #speed-slider {
      -webkit-appearance: none; appearance: none;
      width: 120px; height: 4px;
      border-radius: 4px; background: var(--surface3);
      outline: none; cursor: pointer;
    }
    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      transition: transform .1s;
    }
    #speed-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
    #speed-val { color: var(--text); font-size: 13px; font-weight: 600; min-width: 34px; }

    /* ── Narrator button ── */
    .narrator-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
    }
    .btn-narrator {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); border: 1.5px solid var(--surface3);
      border-radius: 24px; color: var(--muted);
      cursor: pointer; font-size: 13px; font-weight: 600;
      padding: 8px 18px; transition: all .2s;
    }
    .btn-narrator:hover { border-color: var(--muted); color: var(--text); }
    .btn-narrator.active {
      background: rgba(29,185,84,.12);
      border-color: var(--accent); color: var(--accent);
    }
    .narrator-hint { font-size: 12px; color: var(--muted); }

    /* ── Bottom row ── */
    .bottom-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
    }
    #waveform { display: flex; align-items: center; gap: 3px; height: 40px; flex: 1; }
    .wbar {
      background: var(--accent); border-radius: 3px;
      width: 4px; height: 4px; opacity: .35;
    }
    .playing .wbar { opacity: 1; animation: wv .7s ease-in-out infinite alternate; }
    .playing .wbar:nth-child(2n)  { animation-delay: .05s; }
    .playing .wbar:nth-child(3n)  { animation-delay: .12s; }
    .playing .wbar:nth-child(4n)  { animation-delay: .20s; }
    .playing .wbar:nth-child(5n)  { animation-delay: .08s; }
    .playing .wbar:nth-child(6n)  { animation-delay: .17s; }
    .playing .wbar:nth-child(7n)  { animation-delay: .25s; }
    @keyframes wv { 0% { height: 4px; } 100% { height: 34px; } }

    .btn-row { display: flex; align-items: center; gap: 12px; }
    .btn-stop {
      background: transparent; border: 2px solid var(--surface3);
      border-radius: 50%; color: var(--muted); cursor: pointer;
      font-size: 16px; height: 44px; width: 44px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s;
    }
    .btn-stop:hover { border-color: var(--text); color: var(--text); }
    .btn-play {
      align-items: center; background: var(--accent);
      border: none; border-radius: 50%; color: #000;
      cursor: pointer; display: flex; font-size: 22px;
      height: 58px; justify-content: center;
      transition: background .15s, transform .1s; width: 58px;
    }
    .btn-play:hover { background: var(--accent-h); transform: scale(1.06); }
    .btn-play:active { transform: scale(.97); }

    #status-badge {
      font-size: 12px; color: var(--muted); margin-top: 16px;
      text-align: center; min-height: 18px; transition: color .2s;
    }
    #status-badge.err { color: #f4533a; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

    /* ── Book Library ── */
    .library-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .btn-pdf {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1.5px solid var(--surface3);
      border-radius: 24px; color: var(--muted);
      cursor: pointer; font-size: 13px; font-weight: 600;
      padding: 7px 16px; transition: all .2s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-pdf:hover { border-color: var(--muted); color: var(--text); }
    .books-select {
      flex: 1; min-width: 0;
      background: var(--surface2); border: 1px solid var(--surface3);
      border-radius: 20px; color: var(--text); cursor: pointer;
      font-size: 13px; font-weight: 600; outline: none; padding: 8px 14px;
      transition: background .15s; max-width: 340px;
    }
    .books-select:hover { background: var(--surface3); }
    .books-select:focus { border-color: var(--accent); }
    .btn-del-book {
      background: transparent; border: 1.5px solid #555;
      border-radius: 50%; color: #888; cursor: pointer;
      font-size: 14px; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s; flex-shrink: 0;
    }
    .btn-del-book:hover { border-color: #f4533a; color: #f4533a; }

    /* ── Page navigation ── */
    .pdf-nav-bar {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap; margin-bottom: 14px;
      background: var(--surface2); border-radius: 10px; padding: 10px 14px;
    }
    .pdf-filename {
      font-size: 13px; color: var(--text); font-weight: 600;
      flex: 1; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .pdf-page-controls { display: flex; align-items: center; gap: 6px; }
    .pdf-nav-btn {
      background: var(--surface3); border: none;
      border-radius: 6px; color: var(--text); cursor: pointer;
      font-size: 16px; font-weight: 700; padding: 3px 10px;
      transition: background .15s; line-height: 1.4;
    }
    .pdf-nav-btn:hover:not(:disabled) { background: #444; }
    .pdf-nav-btn:disabled { opacity: .3; cursor: default; }
    #pdf-page-input {
      background: var(--surface3); border: 1px solid transparent;
      border-radius: 6px; color: var(--text); font-size: 13px; font-weight: 600;
      padding: 4px 8px; text-align: center; width: 58px; outline: none;
      -moz-appearance: textfield;
    }
    #pdf-page-input::-webkit-outer-spin-button,
    #pdf-page-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    #pdf-page-input:focus { border-color: var(--accent); }
    .pdf-page-label { font-size: 13px; color: var(--muted); white-space: nowrap; }
    .auto-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap;
    }
    .auto-label input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }

    /* ── Retry button ── */
    .btn-retry {
      display: none; margin: 10px auto 0; padding: 9px 22px;
      background: transparent; border: 1.5px solid var(--accent);
      border-radius: 24px; color: var(--accent);
      cursor: pointer; font-size: 13px; font-weight: 600;
      transition: background .15s, color .15s;
    }
    .btn-retry:hover { background: var(--accent); color: #000; }

    /* ── Library modal ── */
    .lib-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 200;
      overflow-y: auto; padding: 24px;
    }
    .lib-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
    .lib-panel {
      width: 100%; max-width: 760px; background: var(--surface);
      border-radius: 16px; padding: 28px;
      box-shadow: 0 24px 64px rgba(0,0,0,.7);
    }
    .lib-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .lib-header h2 { font-size: 20px; font-weight: 700; }
    .lib-close {
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; font-size: 22px; line-height: 1;
      transition: color .15s;
    }
    .lib-close:hover { color: var(--text); }
    .lib-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .book-card {
      background: var(--surface2); border: 1.5px solid var(--surface3);
      border-radius: 12px; padding: 16px; cursor: pointer;
      transition: border-color .2s, background .2s;
      display: flex; flex-direction: column; gap: 6px;
    }
    .book-card:hover { border-color: var(--accent); background: var(--surface3); }
    .book-card-title {
      font-size: 14px; font-weight: 700; color: var(--text);
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .book-card-meta { font-size: 12px; color: var(--muted); }
    .book-card-progress {
      font-size: 12px; color: var(--accent); font-weight: 600;
    }
    .book-card-continue {
      margin-top: auto; padding: 7px 0; border: none; border-radius: 20px;
      background: var(--accent); color: #000;
      cursor: pointer; font-size: 12px; font-weight: 700;
      transition: background .15s;
    }
    .book-card-continue:hover { background: var(--accent-h); }
    .lib-empty { color: var(--muted); font-size: 14px; text-align: center; padding: 24px 0; }
    .btn-library {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1.5px solid var(--surface3);
      border-radius: 24px; color: var(--muted);
      cursor: pointer; font-size: 13px; font-weight: 600;
      padding: 7px 16px; transition: all .2s; white-space: nowrap;
    }
    .btn-library:hover { border-color: var(--muted); color: var(--text); }
    .btn-library.has-books { border-color: var(--accent); color: var(--accent); }

    /* ── Mobile layout ── */
    @media (max-width: 600px) {
      body { padding: 0; align-items: stretch; }

      .card {
        border-radius: 0;
        min-height: 100dvh;
        flex-direction: column;
      }

      /* Scroll area ocupa todo o espaço disponível */
      .card-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 18px 14px 12px;
        /* espaço para não ficar atrás do player fixo */
        padding-bottom: calc(140px + env(safe-area-inset-bottom));
      }

      /* Player fixo no rodapé */
      .card-player {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: var(--surface);
        border-top: 1px solid var(--surface3);
        box-shadow: 0 -8px 32px rgba(0,0,0,.5);
        padding: 12px 14px calc(14px + env(safe-area-inset-bottom));
        z-index: 100;
      }

      .header { margin-bottom: 14px; }
      .logo h1 { font-size: 18px; }
      .engine-btn { font-size: 11px; padding: 5px 10px; }
      #text-input { min-height: 140px; font-size: 15px; line-height: 1.65; }
      #text-display { font-size: 17px; line-height: 1.75; max-height: 45vh; }
      .controls { flex-direction: column; align-items: stretch; gap: 14px; }
      .ctrl-select { max-width: 100%; }
      #speed-slider { width: 100%; }
      .bottom-row { gap: 10px; }
      .btn-play { height: 52px; width: 52px; font-size: 20px; }
      .progress-track { margin-bottom: 12px; }
      #status-badge { margin-top: 8px; }
      .lib-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .lib-overlay { padding: 0; }
      .lib-panel { border-radius: 0; min-height: 100dvh; padding: 20px 14px; }
    }
  </style>
</head>
<body>
<div class="card">
<div class="card-scroll">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">♫</div>
      <h1>TTS Player</h1>
    </div>
    <div class="header-right">
      <div class="engine-toggle">
        <button class="engine-btn active" id="btn-edge"   onclick="setEngine('edge')"   title="Microsoft Neural TTS — requer internet">Neural</button>
        <button class="engine-btn"         id="btn-kokoro" onclick="setEngine('kokoro')" title="Kokoro — roda offline">Offline</button>
      </div>
      <select id="lang-select" class="lang-pill" onchange="onLangChange()">
        <option value="pt-BR">pt-BR</option>
        <option value="en-US">en-US</option>
      </select>
    </div>
  </div>

  <!-- Book Library -->
  <input type="file" id="pdf-file-input" accept=".pdf,.epub" style="display:none" onchange="onPdfSelected(event)">
  <div class="library-row">
    <button class="btn-pdf" onclick="document.getElementById('pdf-file-input').click()" title="Adicionar livro à biblioteca">📄 Novo Livro</button>
    <button class="btn-library" id="btn-library" onclick="openLibrary()">📚 Biblioteca</button>
    <button class="btn-del-book" id="btn-del-book" onclick="deleteCurrentBook()" title="Remover da biblioteca" style="display:none">🗑</button>
  </div>

  <!-- Library modal -->
  <div class="lib-overlay" id="lib-overlay" onclick="onOverlayClick(event)">
    <div class="lib-panel">
      <div class="lib-header">
        <h2>📚 Biblioteca</h2>
        <button class="lib-close" onclick="closeLibrary()">✕</button>
      </div>
      <div class="lib-grid" id="lib-grid"></div>
    </div>
  </div>

  <!-- Page navigation (visible when a book is open) -->
  <div class="pdf-nav-bar" id="pdf-nav-bar" style="display:none">
    <span class="pdf-filename" id="pdf-filename-display"></span>
    <div class="pdf-page-controls">
      <button class="pdf-nav-btn" id="pdf-prev" onclick="prevPage()" disabled>‹</button>
      <input type="number" id="pdf-page-input" min="1" value="1">
      <span class="pdf-page-label">/ <span id="pdf-total">0</span></span>
      <button class="pdf-nav-btn" id="pdf-next" onclick="nextPage()" disabled>›</button>
    </div>
    <label class="auto-label">
      <input type="checkbox" id="auto-advance" checked>
      Auto-avançar
    </label>
  </div>

  <!-- Text area / karaoke view -->
  <div class="text-section">
    <textarea id="text-input" placeholder="Cole o texto aqui para ouvir…" spellcheck="false"></textarea>
    <div id="text-display"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="control-group">
      <span class="control-label">Voz</span>
      <select id="voice-select" class="ctrl-select" onchange="saveSettings()"></select>
    </div>
    <div class="control-group">
      <span class="control-label">Velocidade <span id="speed-val">1.0×</span></span>
      <div class="speed-row">
        <input id="speed-slider" type="range" min="0.5" max="2.0" step="0.1" value="1.0"
               oninput="document.getElementById('speed-val').textContent = parseFloat(this.value).toFixed(1) + '×'; saveSettings()" />
      </div>
    </div>
  </div>

  <!-- Narrator -->
  <div class="narrator-row">
    <button class="btn-narrator" id="btn-narrator" onclick="toggleNarrator()">
      🎙 Modo Narrador
    </button>
    <span class="narrator-hint" id="narrator-hint"></span>
  </div>

</div><!-- /card-scroll -->

<div class="card-player">
  <!-- Progress -->
  <div class="progress-track"><div id="progress-fill"></div></div>

  <!-- Waveform + buttons -->
  <div class="bottom-row">
    <div id="waveform"></div>
    <div class="btn-row">
      <button class="btn-stop" onclick="stopPlayback()" title="Parar">■</button>
      <button class="btn-play" id="btn-play" onclick="togglePlay()" title="Play / Pause">▶</button>
    </div>
  </div>

  <div id="status-badge"></div>
  <div style="text-align:center">
    <button class="btn-retry" id="btn-retry" onclick="retryPlayback()">↺ Tentar novamente</button>
  </div>
</div><!-- /card-player -->

</div><!-- /card -->

<script>
// ── Voice definitions ────────────────────────────────────────────────────────
const VOICES = {
  "pt-BR": {
    edge: [
      { id: "pt-BR-ThalitaMultilingualNeural", label: "Thalita (Feminino) ✦" },
      { id: "pt-BR-AntonioNeural",             label: "Antonio (Masculino)" },
      { id: "pt-BR-FranciscaNeural",           label: "Francisca (Feminino)" },
    ],
    kokoro: [
      { id: "pf_dora",  label: "Dora (Feminino) — offline" },
      { id: "pm_alex",  label: "Alex (Masculino) — offline" },
      { id: "pm_santa", label: "Santa (Masculino) — offline" },
    ],
  },
  "en-US": {
    edge: [
      { id: "en-US-JennyNeural",       label: "Jenny (Female) ✦" },
      { id: "en-US-RogerNeural",       label: "Roger (Male)" },
      { id: "en-US-AndrewNeural",      label: "Andrew (Male)" },
      { id: "en-US-ChristopherNeural", label: "Christopher (Male)" },
      { id: "en-US-EricNeural",        label: "Eric (Male)" },
      { id: "en-US-AriaNeural",        label: "Aria (Female)" },
    ],
    kokoro: [
      { id: "af_bella",   label: "Bella (Female) — offline" },
      { id: "af_sarah",   label: "Sarah (Female) — offline" },
      { id: "am_michael", label: "Michael (Male) — offline" },
      { id: "bm_george",  label: "George (Male) — offline" },
    ],
  },
};

const NARRATOR_VOICE = {
  "pt-BR": "pt-BR-ThalitaMultilingualNeural",
  "en-US": "en-US-RogerNeural",
};

// ── State ────────────────────────────────────────────────────────────────────
let currentEngine     = "edge";
let narratorMode      = false;
let narratorPitch     = "+0Hz";
let ws                = null;
let audioCtx          = null;
let nextTime          = 0;
let isPlaying         = false;
let pendingSentIdx    = -1;
let sentences         = [];
let sentenceWords     = [];   // sentenceWords[i] = ["word1","word2",...]
let lastHighlightSent = -1;   // prevents double-scheduling on silence chunks
let currentWordEl     = null;
let audioChain        = Promise.resolve();

// Highlight queue — fired via rAF so they pause with AudioContext
let pendingHighlights = [];  // [{type, sentIdx, wi, pct, audioCtxTime}]
let hlLoopActive      = false;

// Reconnection / stability
let reconnectAttempts   = 0;
const MAX_RECONNECT     = 3;
let decodeErrorCount    = 0;
let stallTimer          = null;
let lastWsPayload       = null;
let lastDecodedSentIdx  = -1;  // last sentence successfully decoded & scheduled
let reconnectSentOffset = 0;   // sentence index offset when reconnecting mid-text

// Audio queue (replaces promise chain)
let audioQueue      = [];
let audioProcessing = false;
let firstChunkReceived = false;

// iOS: resume AudioContext when user returns to the tab/app
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && audioCtx && audioCtx.state === "suspended" && isPlaying) {
    audioCtx.resume();
  }
});

// ── Waveform ─────────────────────────────────────────────────────────────────
(function () {
  const wf = document.getElementById("waveform");
  for (let i = 0; i < 24; i++) {
    const b = document.createElement("div");
    b.className = "wbar";
    wf.appendChild(b);
  }
})();

// ── Engine / voice ────────────────────────────────────────────────────────────
function setEngine(eng) {
  if (isPlaying) stopPlayback();
  currentEngine = eng;
  document.getElementById("btn-edge").classList.toggle("active", eng === "edge");
  document.getElementById("btn-kokoro").classList.toggle("active", eng === "kokoro");
  populateVoices();
  saveSettings();
}

function populateVoices() {
  const lang = document.getElementById("lang-select").value;
  const list = VOICES[lang][currentEngine] || [];
  const sel  = document.getElementById("voice-select");
  sel.innerHTML = list.map(v => `<option value="${v.id}">${v.label}</option>`).join("");
}

function onLangChange() {
  if (isPlaying) stopPlayback();
  populateVoices();
  if (narratorMode) applyNarratorVoice();
  saveSettings();
}

populateVoices();

// ── Settings persistence ──────────────────────────────────────────────────────
function saveSettings() {
  try {
    localStorage.setItem('tts_settings', JSON.stringify({
      voice:    document.getElementById('voice-select').value,
      speed:    document.getElementById('speed-slider').value,
      language: document.getElementById('lang-select').value,
      engine:   currentEngine,
      narrator: narratorMode,
    }));
  } catch(_) {}
}

(function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('tts_settings') || '{}');
    if (s.language) { document.getElementById('lang-select').value = s.language; populateVoices(); }
    if (s.engine && s.engine !== currentEngine) setEngine(s.engine);
    if (s.voice) document.getElementById('voice-select').value = s.voice;
    if (s.speed) {
      document.getElementById('speed-slider').value = s.speed;
      document.getElementById('speed-val').textContent = parseFloat(s.speed).toFixed(1) + '×';
    }
    if (s.narrator) toggleNarrator();
  } catch(_) {}
})();

// ── Narrator ──────────────────────────────────────────────────────────────────
function toggleNarrator() {
  if (currentEngine !== "edge") return;
  narratorMode = !narratorMode;
  document.getElementById("btn-narrator").classList.toggle("active", narratorMode);
  const hint = document.getElementById("narrator-hint");
  if (narratorMode) {
    narratorPitch = "-3Hz";
    applyNarratorVoice();
    hint.textContent = "Thalita · entonação emocional · pausas dramáticas";
  } else {
    narratorPitch = "+0Hz";
    hint.textContent = "";
  }
  saveSettings();
}

function applyNarratorVoice() {
  const lang  = document.getElementById("lang-select").value;
  const voice = NARRATOR_VOICE[lang];
  const sel   = document.getElementById("voice-select");
  if ([...sel.options].some(o => o.value === voice)) sel.value = voice;
  document.getElementById("speed-slider").value = "1.0";
  document.getElementById("speed-val").textContent = "1.0×";
}

// ── Sentence / word helpers ───────────────────────────────────────────────────
function parseSentences(text) {
  const parts = text.trim().split(/(?<=[.!?])\s+/);
  const result = [];
  for (let p of parts) {
    p = p.trim();
    if (!p) continue;
    if (p.length > 200) {
      p.split(/(?<=[,;:])\s+/).forEach(s => { if (s.trim()) result.push(s.trim()); });
    } else {
      result.push(p);
    }
  }
  return result.length ? result : [text.trim()];
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function buildDisplayView(text) {
  sentences     = parseSentences(text);
  sentenceWords = sentences.map(s => s.split(/\s+/).filter(w => w.length > 0));
  lastHighlightSent = -1;
  currentWordEl     = null;

  document.getElementById("text-display").innerHTML = sentences.map((sent, si) =>
    sentenceWords[si].map((w, wi) =>
      `<span class="word" id="w${si}-${wi}">${escHtml(w)}</span>`
    ).join(" ")
  ).join("  ");
}

// ── Karaoke word timing ───────────────────────────────────────────────────────
function computeWordTimings(words, totalMs) {
  // Distribute time proportionally to character count + small gap weight per word
  const GAP = 0.4;
  const total = words.reduce((s, w) => s + w.length, 0) + words.length * GAP;
  let offset = 0;
  return words.map(w => {
    const start = (offset / total) * totalMs;
    offset += w.length + GAP;
    const end = (offset / total) * totalMs;
    return { start, dur: end - start };
  });
}

function highlightWord(sentIdx, wordIdx) {
  // Mark previous word as done
  if (currentWordEl) {
    currentWordEl.classList.remove("active");
    currentWordEl.classList.add("done");
  }
  const el = document.getElementById(`w${sentIdx}-${wordIdx}`);
  if (!el) return;
  el.classList.add("active");
  currentWordEl = el;
  el.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(msg, isError = false) {
  const el = document.getElementById("status-badge");
  el.textContent = msg;
  el.className = isError ? "err" : "";
}

function setPlayingState(playing) {
  isPlaying = playing;
  document.getElementById("btn-play").textContent = playing ? "⏸" : "▶";
  document.getElementById("waveform").classList.toggle("playing", playing);
  document.getElementById("text-input").style.display   = playing ? "none"  : "block";
  document.getElementById("text-display").style.display = playing ? "block" : "none";
  if (!playing) {
    document.getElementById("progress-fill").style.width = "0%";
    document.querySelectorAll(".word").forEach(el => {
      el.classList.remove("active", "done");
    });
    currentWordEl = null;
    setStatus("");
  }
}

// ── Highlight loop (rAF-based, pauses with AudioContext) ─────────────────────
function ensureHlLoop() {
  if (!hlLoopActive) {
    hlLoopActive = true;
    requestAnimationFrame(hlLoop);
  }
}

function hlLoop() {
  if (!isPlaying || !audioCtx || audioCtx.state === "closed") {
    hlLoopActive = false;
    return;
  }
  const now = audioCtx.currentTime;
  const remaining = [];
  for (const h of pendingHighlights) {
    if (now >= h.audioCtxTime) {
      if (h.type === "progress") {
        document.getElementById("progress-fill").style.width = h.pct + "%";
      } else {
        highlightWord(h.sentIdx, h.wi);
      }
    } else {
      remaining.push(h);
    }
  }
  pendingHighlights = remaining;
  requestAnimationFrame(hlLoop);
}

// ── Audio queue (replaces unbounded promise chain) ───────────────────────────
async function processAudioQueue() {
  if (audioProcessing) return;
  audioProcessing = true;
  while (audioQueue.length > 0 && isPlaying) {
    const item = audioQueue.shift();
    if (item.type === "sentinel") { item.resolve(); continue; }
    await scheduleAudioChunk(item.arrayBuffer, item.sentIdx);
  }
  audioProcessing = false;
}

function enqueueAudio(arrayBuffer, sentIdx) {
  audioQueue.push({ arrayBuffer: arrayBuffer.slice(0), sentIdx });
  if (!audioProcessing) processAudioQueue();
}

function enqueueSentinel() {
  return new Promise(resolve => {
    audioQueue.push({ type: "sentinel", resolve });
    if (!audioProcessing) processAudioQueue();
  });
}

// ── Audio scheduling ──────────────────────────────────────────────────────────
async function scheduleAudioChunk(arrayBuffer, sentIdx) {
  if (!audioCtx || audioCtx.state === "closed") return;

  // iOS: AudioContext starts suspended and must be resumed inside a user gesture chain
  if (audioCtx.state !== "running") {
    try { await audioCtx.resume(); } catch (_) {}
  }

  let audioBuffer;
  try {
    audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    decodeErrorCount = 0;
    if (sentIdx !== null && sentIdx >= 0) lastDecodedSentIdx = sentIdx;
  } catch (e) {
    decodeErrorCount++;
    if (decodeErrorCount >= 2) setStatus("Aviso: problema ao decodificar áudio.", true);
    console.warn("Decode error:", e);
    return;
  }

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);

  const startAt = Math.max(nextTime, audioCtx.currentTime + 0.06);
  source.start(startAt);
  nextTime = startAt + audioBuffer.duration;

  // Enqueue karaoke highlights — fired by hlLoop, so they freeze with AudioContext
  if (sentIdx !== null && sentIdx !== lastHighlightSent && sentenceWords[sentIdx]) {
    lastHighlightSent = sentIdx;
    const words   = sentenceWords[sentIdx];
    const timings = computeWordTimings(words, audioBuffer.duration * 1000);
    const pct     = sentences.length > 1 ? ((sentIdx + 1) / sentences.length) * 100 : 100;

    pendingHighlights.push({ type: "progress", pct, audioCtxTime: startAt });
    timings.forEach((t, wi) => {
      pendingHighlights.push({ type: "word", sentIdx, wi, audioCtxTime: startAt + t.start / 1000 });
    });
    ensureHlLoop();
  }
}

// ── Book Library ──────────────────────────────────────────────────────────────
let pdfPages       = [];
let currentPdfPage = -1;
let currentBookId  = null;

function openLibrary() {
  document.getElementById("lib-overlay").classList.add("open");
  loadBookLibrary();
}

function closeLibrary() {
  document.getElementById("lib-overlay").classList.remove("open");
}

function onOverlayClick(e) {
  if (e.target === document.getElementById("lib-overlay")) closeLibrary();
}

async function loadBookLibrary() {
  const grid = document.getElementById("lib-grid");
  grid.innerHTML = '<p class="lib-empty">Carregando…</p>';
  try {
    const books = await fetch("/api/books").then(r => r.json());
    const btn = document.getElementById("btn-library");
    btn.textContent = books.length ? `📚 Biblioteca (${books.length})` : "📚 Biblioteca";
    btn.classList.toggle("has-books", books.length > 0);

    if (!books.length) {
      grid.innerHTML = '<p class="lib-empty">Nenhum livro na biblioteca.<br>Clique em "Novo Livro" para adicionar.</p>';
      return;
    }

    grid.innerHTML = books.map(b => {
      const pct   = b.total > 0 ? Math.round((b.last_page / b.total) * 100) : 0;
      const label = b.last_page > 0 ? `Pág. ${b.last_page + 1} de ${b.total} · ${pct}%` : `${b.total} páginas`;
      const cont  = b.last_page > 0 ? "Continuar →" : "Ler →";
      return `
        <div class="book-card" onclick="selectBook('${b.id}')">
          <div class="book-card-title">${b.filename.replace(/\.(pdf|epub)$/i,'')}</div>
          <div class="book-card-meta">${b.total} páginas</div>
          ${b.last_page > 0 ? `<div class="book-card-progress">● ${label}</div>` : `<div class="book-card-meta">${label}</div>`}
          <button class="book-card-continue" onclick="selectBook('${b.id}'); event.stopPropagation()">${cont}</button>
        </div>`;
    }).join('');
  } catch (e) {
    grid.innerHTML = '<p class="lib-empty">Biblioteca indisponível.</p>';
    console.warn("Biblioteca:", e);
  }
}

async function selectBook(bookId) {
  closeLibrary();
  if (!bookId) {
    document.getElementById("pdf-nav-bar").style.display = "none";
    document.getElementById("btn-del-book").style.display = "none";
    currentBookId = null;
    pdfPages = [];
    currentPdfPage = -1;
    return;
  }
  setStatus("Carregando livro…");
  try {
    const data = await fetch(`/api/books/${bookId}`).then(r => r.json());
    pdfPages = data.pages;
    currentBookId = bookId;
    document.getElementById("pdf-filename-display").textContent =
      data.filename + " — " + data.total + " páginas";
    document.getElementById("pdf-total").textContent = data.total;
    document.getElementById("pdf-page-input").max = data.total;
    document.getElementById("pdf-nav-bar").style.display = "flex";
    document.getElementById("btn-del-book").style.display = "flex";
    const startPage = data.last_page || 0;
    loadPage(startPage);
    setStatus(startPage > 0 ? `Retomando da página ${startPage + 1}.` : "");
  } catch (e) {
    setStatus("Erro ao carregar livro: " + e.message, true);
  }
}

async function onBookSelected(bookId) { await selectBook(bookId); }

async function onPdfSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = "";
  setStatus("Salvando livro na biblioteca…");
  const fd = new FormData();
  fd.append("file", file);
  try {
    const resp = await fetch("/api/pdf", { method: "POST", body: fd });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    await loadBookLibrary();
    document.getElementById("books-select").value = data.id;
    await onBookSelected(data.id);
  } catch (e) {
    setStatus("Erro ao salvar PDF: " + e.message, true);
  }
}

async function deleteCurrentBook() {
  if (!currentBookId) return;
  if (!confirm("Remover este livro da biblioteca?")) return;
  try {
    await fetch(`/api/books/${currentBookId}`, { method: "DELETE" });
    currentBookId = null;
    pdfPages = [];
    currentPdfPage = -1;
    document.getElementById("pdf-nav-bar").style.display = "none";
    document.getElementById("btn-del-book").style.display = "none";
    document.getElementById("text-input").value = "";
    await loadBookLibrary();
    setStatus("Livro removido.");
  } catch (e) {
    setStatus("Erro ao remover: " + e.message, true);
  }
}

function loadPage(n) {
  if (!pdfPages.length) return;
  n = Math.max(0, Math.min(n, pdfPages.length - 1));
  currentPdfPage = n;
  document.getElementById("pdf-page-input").value = n + 1;
  document.getElementById("pdf-prev").disabled = n === 0;
  document.getElementById("pdf-next").disabled = n === pdfPages.length - 1;
  document.getElementById("text-input").value = pdfPages[n].text;
  saveProgress(n);
}

async function saveProgress(page) {
  if (!currentBookId) return;
  try {
    await fetch(`/api/books/${currentBookId}/progress`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ page }),
    });
  } catch (_) {
    // falha silenciosa — progresso não é crítico
  }
}

function prevPage() {
  if (currentPdfPage > 0) { if (isPlaying) stopPlayback(); loadPage(currentPdfPage - 1); }
}

function nextPage() {
  if (currentPdfPage < pdfPages.length - 1) { if (isPlaying) stopPlayback(); loadPage(currentPdfPage + 1); }
}

document.getElementById("pdf-page-input").addEventListener("change", function () {
  const n = parseInt(this.value) - 1;
  if (!isNaN(n)) { if (isPlaying) stopPlayback(); loadPage(n); }
});

loadBookLibrary();

// ── Playback controls ─────────────────────────────────────────────────────────
function togglePlay() {
  if (isPlaying) { pauseAudio(); } else { startPlayback(); }
}

function pauseAudio() {
  if (!audioCtx) return;
  if (audioCtx.state === "running") {
    audioCtx.suspend();
    document.getElementById("btn-play").textContent = "▶";
    document.getElementById("waveform").classList.remove("playing");
    setStatus("Pausado");
  } else if (audioCtx.state === "suspended") {
    audioCtx.resume();
    document.getElementById("btn-play").textContent = "⏸";
    document.getElementById("waveform").classList.add("playing");
    setStatus("Reproduzindo…");
  }
}

function startPlayback() {
  const text = document.getElementById("text-input").value.trim();
  if (!text) { setStatus("Cole algum texto antes de pressionar Play.", true); return; }

  const voice    = document.getElementById("voice-select").value;
  const speed    = parseFloat(document.getElementById("speed-slider").value);
  const language = document.getElementById("lang-select").value;
  const engine   = currentEngine;

  const AC = window.AudioContext || window.webkitAudioContext;
  audioCtx   = new AC();
  nextTime   = audioCtx.currentTime + 0.1;
  audioChain = Promise.resolve();
  audioQueue = []; audioProcessing = false; firstChunkReceived = false;
  pendingSentIdx    = -1;
  lastHighlightSent = -1;
  currentWordEl     = null;
  pendingHighlights = [];
  hlLoopActive      = false;
  reconnectAttempts   = 0;
  decodeErrorCount    = 0;
  lastDecodedSentIdx  = -1;
  reconnectSentOffset = 0;
  document.getElementById('btn-retry').style.display = 'none';

  // iOS: sync play button with AudioContext interruptions (phone call, etc.)
  audioCtx.onstatechange = () => {
    if (!isPlaying) return;
    const btn = document.getElementById("btn-play");
    const wf  = document.getElementById("waveform");
    if (audioCtx.state === "running") {
      btn.textContent = "⏸";
      wf.classList.add("playing");
    } else if (audioCtx.state === "suspended" || audioCtx.state === "interrupted") {
      btn.textContent = "▶";
      wf.classList.remove("playing");
    }
  };

  buildDisplayView(text);
  setPlayingState(true);
  setStatus(engine === "edge" ? "Conectando…" : "Carregando…");

  lastWsPayload = { text, voice, speed, language, engine, pitch: narratorPitch, narrator: narratorMode };
  openWebSocket(lastWsPayload);
}

function openWebSocket(payload) {
  clearTimeout(stallTimer);
  stallTimer = setTimeout(() => {
    if (ws) { ws.onclose = null; ws.close(); ws = null; }
    attemptReconnect();
  }, 15000);

  const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${wsProto}//${location.host}/ws`);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    ws.send(JSON.stringify(payload));
    setStatus("Reproduzindo…");
  };

  ws.onmessage = (event) => {
    resetStallTimer();
    if (event.data instanceof ArrayBuffer) {
      if (!firstChunkReceived) { firstChunkReceived = true; setStatus("Reproduzindo…"); }
      enqueueAudio(event.data, pendingSentIdx);
    } else {
      const msg = JSON.parse(event.data);
      if (msg.type === "sentence_start") {
        pendingSentIdx = msg.index + reconnectSentOffset;
        if (msg.words) sentenceWords[pendingSentIdx] = msg.words;
        const total = sentences.length;
        setStatus(`Gerando frase ${pendingSentIdx + 1} de ${total}…`);
      } else if (msg.type === "done") {
        clearTimeout(stallTimer);
        reconnectAttempts = 0;
        enqueueSentinel().then(() => {
          const remaining = Math.max(0, nextTime - audioCtx.currentTime);
          setTimeout(() => {
            if (!isPlaying) return;
            const autoAdv = pdfPages.length > 0
              && document.getElementById("auto-advance").checked
              && currentPdfPage < pdfPages.length - 1;
            if (autoAdv) {
              setPlayingState(false);
              loadPage(currentPdfPage + 1);
              setTimeout(() => startPlayback(), 350);
            } else {
              setPlayingState(false);
              setStatus(pdfPages.length > 0 ? "Página concluída." : "Concluído.");
            }
          }, remaining * 1000 + 400);
        });
      } else if (msg.type === "error") {
        setStatus("Erro: " + msg.message, true);
        document.getElementById('btn-retry').style.display = 'inline-block';
        stopPlayback();
      }
    }
  };

  ws.onerror = () => {
    clearTimeout(stallTimer);
  };

  ws.onclose = (e) => {
    clearTimeout(stallTimer);
    if (isPlaying && e.code !== 1000) {
      attemptReconnect();
    }
  };
}

function resetStallTimer() {
  clearTimeout(stallTimer);
  stallTimer = setTimeout(() => {
    if (ws) { ws.onclose = null; ws.close(); ws = null; }
    attemptReconnect();
  }, 15000);
}

function attemptReconnect() {
  if (!isPlaying || !lastWsPayload || reconnectAttempts >= MAX_RECONNECT) {
    setStatus("Erro de conexão com o servidor.", true);
    setPlayingState(false);
    if (lastWsPayload) document.getElementById('btn-retry').style.display = 'inline-block';
    return;
  }
  reconnectAttempts++;
  const delay = 1000 * reconnectAttempts;
  setStatus(`Reconectando (${reconnectAttempts}/${MAX_RECONNECT})…`);

  const sentOffset = lastDecodedSentIdx + 1;
  const hasRemaining = sentOffset > 0 && sentOffset < sentences.length;
  reconnectSentOffset = hasRemaining ? sentOffset : 0;
  const reconnectPayload = hasRemaining
    ? { ...lastWsPayload, text: sentences.slice(sentOffset).join(" ") }
    : lastWsPayload;

  // Manter AudioContext vivo: áudio já bufferizado continua tocando
  // enquanto a reconexão acontece. Só recriar se estiver fechado.
  if (!audioCtx || audioCtx.state === "closed") {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    nextTime = audioCtx.currentTime + 0.1;
  }

  // Limpar fila antiga sem tocar no AudioContext ou no nextTime
  audioQueue = []; audioProcessing = false; firstChunkReceived = false;
  pendingSentIdx = reconnectSentOffset - 1;
  decodeErrorCount = 0;

  setTimeout(() => openWebSocket(reconnectPayload), delay);
}

function retryPlayback() {
  document.getElementById('btn-retry').style.display = 'none';
  reconnectAttempts = 0;

  // Ao retry manual (após falha total), recriar AudioContext se necessário
  if (!audioCtx || audioCtx.state === "closed") {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    nextTime = audioCtx.currentTime + 0.1;
  }

  isPlaying = true;
  document.getElementById('btn-play').textContent = '⏸';
  document.getElementById('waveform').classList.add('playing');
  attemptReconnect();
}

function stopPlayback() {
  clearTimeout(stallTimer);
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "stop" }));
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  if (audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; }
  nextTime          = 0;
  audioChain        = Promise.resolve();
  audioQueue        = []; audioProcessing = false;
  pendingHighlights = [];
  hlLoopActive      = false;
  reconnectAttempts = 0;
  decodeErrorCount  = 0;
  document.getElementById('btn-retry').style.display = 'none';
  setPlayingState(false);
}
