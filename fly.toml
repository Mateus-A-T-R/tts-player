# Nome do app — precisa ser único no Fly.io (troque "tts-player" por algo seu)
app = "tts-player-mateus"
primary_region = "gru"

[build]

[env]
  BOOKS_DIR = "/data/books"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "books_data"
  destination = "/data/books"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
